docker:
  - image: cimg/android:2024.01.1-node
resource_class: large
shell: /bin/bash -eo pipefail
environment:
  GRADLE_OPTS: '-Dorg.gradle.jvmargs="-Xmx2048m" -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2'
  FASTLANE_SKIP_UPDATE_CHECK: true
steps:
  - checkout
  - prepare_workspace
  - restore_environment_variables
  - install_flutter:
      precache: android
  - prepare_project
  - install_fastlane:
      directory: android
  - install_gradle_dependencies
  - run:
      # The following commands are necessary since CMake and Ninja are required to build the app for android but are not included in cimg/android
      # https://github.com/CircleCI-Public/cimg-android/issues/129
      name: Install Ninja
      command: |
        sudo apt-get update && sudo apt-get install -y ninja-build
  - run:
      name: Install CMake
      command: |
        wget https://github.com/Kitware/CMake/releases/download/v3.22.1/cmake-3.22.1-Linux-x86_64.tar.gz
        tar -xzvf cmake-3.22.1-Linux-x86_64.tar.gz -C $HOME
        export PATH=$HOME/ninja:$HOME/cmake-3.22.1-Linux-x86_64/bin:$PATH
  - run:
      name: Set CMake and Ninja Paths
      command: |
        export PATH=$HOME/ninja:$HOME/cmake-3.22.1-Linux-x86_64/bin:$PATH
  - run:
      name: Accept Android SDK Licenses
      command: yes | sdkmanager --licenses || if [ $? -ne '141' ]; then exit $?; fi;
  - run:
      name: '[FL] Prepare Android Keystore'
      command: bundle exec fastlane android keystore
      working_directory: android
  - run:
      name: '[FL] Build'
      command: bundle exec fastlane android build version_name:${NEW_VERSION_NAME} version_code:${NEW_VERSION_CODE}
      working_directory: android
  - run:
      name: Move aab
      command: mv ~/project/build/app/outputs/bundle/release/app-release.aab app-release.aab
  - store_artifacts:
      path: app-release.aab
  - run:
      name: Move apk
      command: mv ~/project/build/app/outputs/apk/release/app-release.apk app-release.apk
  - store_artifacts:
      path: app-release.apk
  - persist_to_workspace:
      root: .
      paths:
        - app-release.aab
        - app-release.apk
  - persist_environment_variables
